# Alembic configuration file
#
# This file contains the configuration and logging settings for Alembic, a lightweight
# database migration tool. See the full documentation at http://alembic.zzzcomputing.com/

[alembic]
# path to migration scripts
script_location = alembic

# template_location specifies where the `alembic init` command will place new migration files.
# Default None, with default of `alembic/templates`
# template_location =

# sys_argv can be used to pass additional command line arguments to alembic
# sys_argv =

# the output encoding used when revision files write new Python code into script.py.mako.
# Default is 'utf-8'
output_encoding = utf-8

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Sqlalchemy database URL placeholder
# This will be overridden by the DATABASE_URL environment variable in env.py
sqlalchemy.url = driver://user:password@localhost/dbname

# If SQLAlchemy is configured to use connections from a connection pool,
# set this to false for performance/resource benefits.
sqlalchemy.echo = False

# When set to true, alembic will display a prompt "DROP TABLE ... CASCADE?" before dropping a table.
# Only applies if dialect_opts is set.
sqlalchemy.echo_pool = False

# When set to true, the migration will use INSERT ... ON CONFLICT (PostgreSQL only feature)
# for primary key conflicts, keeping data integrity while allowing migration with existing data.
sqlalchemy.strategy = plain

# Migration directory structure
# Possible values: "single" or "multi"
# single: All migrations in one directory
# multi: Migrations organized by branch
version_path_separator = :

# Connection pooling configuration
# For async mode, NullPool is typically used to avoid connection pool issues
sqlalchemy.poolclass = sqlalchemy.pool.NullPool

# sqlalchemy.pool.size can be set to control pool size
# For async mode, this is usually managed by asyncpg
# sqlalchemy.pool.size = 20
# sqlalchemy.max_overflow = 40

# Transactional DDL
# Set to true for databases that support transactional DDL
# PostgreSQL supports this and is configured as True by default
# MySQL and other databases may not support this
transactional_ddl = True
